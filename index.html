<!DOCTYPE html>
<!--
  ===================================================================
   ANIMAL INVADERS  🐄🍼
  ===================================================================
  Hi! This is YOUR game. You invented it, and you can change it.

  Everything you'll want to change first lives in the
  "CHANGE THESE TO CUSTOMISE YOUR GAME!" block just below, inside
  the <script> down the page. Look for the big green-comment box.

  To play: just double-click this file to open it in your web browser.
  No installing anything. No internet needed.

  Controls:
    - Move:  Left / Right arrow keys  (or A and D)
    - Shoot: Spacebar
    - Restart after winning/losing: press Enter
  ===================================================================
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Animal Invaders</title>
<style>
  /* Simple retro look. Black space background, white pixel-y text. */
  html, body {
    margin: 0;
    height: 100%;
    color: #fff;
    font-family: "Courier New", monospace;
    /* Stops the arrow keys from scrolling the page while you play. */
    overflow: hidden;
  }
  /* Black goes on <html> ONLY. If we put it on <body> too, the body's
     background would paint OVER the star canvas (which sits at z-index -1)
     and hide it. The root background paints furthest back, behind the stars. */
  html { background: #000; }
  /* Centre the game on the screen. */
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  #game {
    /* Fit the game inside the screen on ANY device, keeping its shape.
       91.67vh = 100vh × (880 ÷ 960) — the canvas's width-to-height ratio.
       So on wide screens it fills the height, and on narrow phones it
       shrinks to fit the width instead — never squashed, never cut off.
       Transparent background so the moving stars show through behind it. */
    display: block;
    width: min(100vw, 91.67vh);
    height: auto;
    background: transparent;
  }
  /* The starfield sits behind EVERYTHING, filling the whole window. */
  #stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    display: block;
  }
  /* Controls line, pinned to the bottom so it doesn't shrink the game. */
  p {
    color: #888;
    font-size: 14px;
    position: fixed;
    bottom: 6px;
    left: 0;
    right: 0;
    text-align: center;
    margin: 0;
    pointer-events: none;
  }
  /* On-screen buttons for phones/tablets. Hidden on mouse computers;
     shown only on touch screens (where the pointer is "coarse"). */
  #touch { display: none; }
  #touch button {
    position: fixed;
    bottom: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    font-size: 24px;
    font-family: inherit;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; /* stops scrolling/zooming when you press a button */
  }
  #touch button:active { background: rgba(255, 255, 255, 0.3); }
  /* FIRE on the LEFT, the ◀ ▶ arrows on the RIGHT. */
  #btn-fire  { left: 20px; font-size: 28px; }
  #btn-right { right: 20px; }
  #btn-left  { right: 88px; }
  @media (pointer: coarse) {
    #touch { display: block; }
    p { display: none; } /* keyboard hints don't help on a touch screen */
  }
  /* Name-entry box — pops up over the game ONLY when you earn a spot on the
     high-score board. An HTML <input> is used (instead of drawing on the
     canvas) so it works everywhere: a real keyboard on computers, and the
     pop-up keyboard on phones/tablets. Hidden until you qualify. */
  #nameentry {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.85);
    border: 2px solid #7ef9ff;
    border-radius: 10px;
    padding: 22px 26px;
    text-align: center;
    z-index: 10;
  }
  #nameentry .title { color: #ffd34d; font-size: 22px; margin-bottom: 14px; }
  #nameentry input {
    font-family: inherit;
    font-size: 22px;
    text-align: center;
    text-transform: uppercase;
    width: 220px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #888;
    background: #111;
    color: #fff;
    outline: none;
  }
  #nameentry button {
    display: block;
    margin: 14px auto 0;
    font-family: inherit;
    font-size: 18px;
    padding: 8px 26px;
    border-radius: 6px;
    border: 1px solid #7ef9ff;
    background: rgba(126, 249, 255, 0.15);
    color: #fff;
    cursor: pointer;
  }
  #nameentry button:active { background: rgba(126, 249, 255, 0.35); }
  /* The "No thanks" dismiss — quieter than SAVE, so it reads as the
     secondary choice. Closes the box without recording a score. */
  #nameentry .skip {
    margin-top: 8px;
    font-size: 14px;
    padding: 6px 18px;
    border-color: #888;
    background: transparent;
    color: #aaa;
  }
  #nameentry .skip:active { background: rgba(255, 255, 255, 0.1); }
</style>
</head>
<body>
<!-- The space we're flying through. Lives behind the game. -->
<canvas id="stars"></canvas>
<div id="wrap">
  <canvas id="game" width="880" height="960"></canvas>
  <p>Move: ← →  (or A / D) &nbsp;•&nbsp; Shoot: Space &nbsp;•&nbsp; Restart: Enter &nbsp;•&nbsp; Sound: M</p>
</div>

<!-- Pops up only when you make the high-score top 20. See the CSS above. -->
<div id="nameentry">
  <div class="title">⭐ NEW HIGH SCORE! ⭐</div>
  <input id="name" maxlength="12" placeholder="YOUR NAME" autocomplete="off" spellcheck="false">
  <button id="savescore">SAVE</button>
  <button id="skipscore" class="skip">No thanks</button>
</div>

<!-- Touch controls — only visible on phones/tablets (see the CSS above). -->
<div id="touch">
  <button id="btn-left" aria-label="Move left">◀</button>
  <button id="btn-right" aria-label="Move right">▶</button>
  <button id="btn-fire" aria-label="Shoot">🔥</button>
</div>

<script>
// =====================================================================
// =====  CHANGE THESE TO CUSTOMISE YOUR GAME!  ========================
// =====================================================================
//
// These are the things that are the most fun to change. Try swapping
// the emoji for different ones, or change the numbers, then save the
// file and re-open it in your browser to see what happens!

// The animals that invade, and what each one shoots. The herd is built
// from a RANDOM mix of these, so every game looks different! Add your own
// pair, or change an emoji — try 🐸 🦖 👾 for animals, ⭐ 🔥 💧 for shots.
const ANIMALS = [
  { animal: "🐄", shot: "🍼" }, // cow shoots milk
  { animal: "🐔", shot: "🥚" }, // chicken shoots eggs
  { animal: "🐷", shot: "💩" }, // pig shoots mud
  { animal: "🐵", shot: "🍌" }, // monkey shoots bananas
  { animal: "🐧", shot: "🧊" }, // penguin shoots ice
];
const PLAYER     = "🚀";   // your ship — try 🛸 🐶 😎
const BULLET_COLOR  = "#7ef9ff"; // colour of YOUR laser streaks — try "#ff5", "#f6f"
const BULLET_LENGTH = 22;  // how long your shots look (bigger = longer streaks)

// --- The numbers you'll reach for first ---
const ROWS        = 4;     // how many rows of animals
const COLS        = 8;     // how many animals in each row
const INVADER_SPEED = 0.6; // how fast the herd slides sideways (bigger = faster)
const MAX_SHOTS     = 3;   // most shots falling at ONCE (the real Space Invaders only allows 3!)
const SHOT_RELOAD   = 45;  // frames to wait between shots (smaller = they shoot more often)
const SHOT_ANGLE    = 1.2; // how far sideways a stray (un-aimed) shot drifts
const AIM_CHANCE    = 0.5; // chance (0–1) a shot is AIMED at you — bigger = sharper shooters
const AIM_MAX       = 2.5; // how sharply an aimed shot can angle toward you
const PLAYER_SPEED  = 4;   // how fast your ship moves (bigger = faster)
const PLAYER_BULLET_SPEED = 5; // how fast your shots fly up
const SHOT_SPEED    = 2; // how fast the animals' shots fall down
const STARTING_LIVES = 3;  // how many tries you get
const SAFE_TIME     = 90;  // frames you flash & can't be hit after losing a life

// --- Stages: clear the herd without dying and a new, faster wave begins ---
const STAGE_SPEEDUP = 0.12; // each stage everything gets this much faster (0.12 = 12%)
const STAGE_BONUS   = 100;  // bonus points for clearing a stage
const BANNER_TIME   = 100;  // frames the big "STAGE N" banner shows for

// --- The bases (shields) you can hide behind ---
const BASE_COUNT   = 3;    // how many bases there are
const BASE_COLOR   = "#5fd66f"; // their colour — try "#7ec8ff" or "#ffd34d"
const BASE_BLOCKS_W = 9;   // how many little blocks wide each base is
const BASE_BLOCKS_H = 5;   // how many little blocks tall each base is
const BASE_BLOCK   = 12;   // size of one little block, in pixels

// --- Want to use your OWN drawing instead of an emoji? ---
// Easy! It takes one line.
//   1. Make a picture in a sprite tool (like Sprite AI or OpenArt) and
//      save the PNG next to this file. A "sprites" folder is fine too,
//      e.g. save it as  sprites/cow.png
//   2. Swap an emoji above for a loadImage(...), e.g. change the cow to:
//        { animal: loadImage("sprites/cow.png"), shot: "🍼" },
//      or change your ship to:
//        const PLAYER = loadImage("sprites/ship.png");
//
// That's it — the game knows how to draw both emoji and pictures.
//
// =====================================================================
// =====  (You can stop reading here if you like! The rest is the  =====
// =====   game engine. Peek if you're curious how it all works.)  =====
// =====================================================================


// ---------------------------------------------------------------------
// loadImage(): the tiny helper that lets a PNG stand in for an emoji.
// It hands back an <img> straight away; the picture fills in once the
// file has loaded. If the file is missing the game just keeps going.
// ---------------------------------------------------------------------
function loadImage(src) {
  const img = new Image();
  img.src = src;
  img.isSprite = true; // a little flag so we know "this is a picture"
  return img;
}

// Grab the canvas (our drawing surface) and its 2D pen ("ctx").
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;

// How big things are drawn, in pixels.
const CELL = 40;          // the size of one animal / the player
const FONT = CELL + "px serif"; // emoji are just text, so we pick a font size

// ---------------------------------------------------------------------
// drawThing(): draws either an emoji (a string) OR a loaded picture,
// centred at (x, y). This is the magic that makes the one-line PNG
// swap above "just work" — every drawing goes through here.
// ---------------------------------------------------------------------
function drawThing(thing, x, y, size, rotate) {
  size = size || CELL;
  // Optionally spin the drawing around its centre (used to point the
  // rocket straight up — the 🚀 emoji leans to the upper-right by default).
  if (rotate) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotate);
    ctx.translate(-x, -y);
  }
  if (typeof thing === "string") {
    // It's an emoji / text. Draw it centred.
    ctx.font = size + "px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(thing, x, y);
  } else if (thing && thing.isSprite && thing.complete && thing.naturalWidth) {
    // It's a picture that has finished loading. Draw it centred.
    ctx.drawImage(thing, x - size / 2, y - size / 2, size, size);
  } else {
    // A picture that isn't ready yet — draw a placeholder box so you
    // can still see and play. It pops in once the PNG loads.
    ctx.fillStyle = "#555";
    ctx.fillRect(x - size / 2, y - size / 2, size, size);
  }
  if (rotate) ctx.restore();
}


// ---------------------------------------------------------------------
// GAME STATE  — all the moving parts live in plain variables.
// ---------------------------------------------------------------------
let player;        // {x, y}
let invaders;      // array of {x, y, alive, animal, shot}
let bullets;       // YOUR shots going up:   array of {x, y}
let shots;         // animal shots coming down: array of {x, y, emoji}
let bases;         // the shields: array of { blocks: [{x, y, alive}] }
let particles;     // explosion bits: array of {x, y, vx, vy, life, maxLife, color}
let invaderDir;    // +1 moving right, -1 moving left
let score;
let lives;
let state;         // "start" (waiting), "playing", or "lost"
let invuln;        // frames left of "just got hit, can't be hit again yet"
let stage;         // which wave you're on (1, 2, 3, ...) — everything speeds up
let stageBanner;   // frames left to show the "STAGE N" banner
let gameOverHandled; // did we already deal with this game over (save score etc.)?
let enteringName;  // true while the "new high score!" name box is open
let lastEntry;     // the run you just saved, so we can highlight it gold

// Remember which keys are currently held down.
const keys = {};

// shotTimer counts down between animal shots, so they come in a steady
// trickle instead of all at once.
let shotTimer = 0;

// ---------------------------------------------------------------------
// buildLevel(): lay out a fresh wave of animals and brand-new bases, and
// clear anything left flying around. Used at the start of every stage.
// ---------------------------------------------------------------------
function buildLevel() {
  // Build the grid of animals, centred across the screen.
  invaders = [];
  const gapX = 70;     // space between animals across
  const gapY = 60;     // space between rows
  const startX = (W - (COLS - 1) * gapX) / 2; // centre the grid horizontally
  const startY = 80;   // top of the grid
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      // Pick a random animal for this spot, so the herd is a mixed bunch.
      const kind = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
      invaders.push({
        x: startX + col * gapX,
        y: startY + row * gapY,
        alive: true,
        animal: kind.animal, // which emoji to draw
        shot: kind.shot      // what it throws at you
      });
    }
  }

  // Build the bases (shields) you can hide behind. Each base is a little
  // grid of blocks; shots eat away one block at a time, so they slowly
  // crumble — from both the animals' shots AND your own bullets. You get
  // fresh bases at the start of each stage.
  bases = [];
  const baseW = BASE_BLOCKS_W * BASE_BLOCK;
  const baseGap = (W - BASE_COUNT * baseW) / (BASE_COUNT + 1); // even spacing
  const baseY = player.y - 150; // sit above the player, with room to duck
  for (let i = 0; i < BASE_COUNT; i++) {
    const bx = baseGap + i * (baseW + baseGap);
    const blocks = [];
    for (let r = 0; r < BASE_BLOCKS_H; r++) {
      for (let c = 0; c < BASE_BLOCKS_W; c++) {
        if (isCarved(r, c)) continue; // shaped: leave carved-out spots empty
        blocks.push({
          x: bx + c * BASE_BLOCK + BASE_BLOCK / 2,
          y: baseY + r * BASE_BLOCK + BASE_BLOCK / 2,
          alive: true,
        });
      }
    }
    bases.push({ blocks });
  }

  // Re-centre the player and clear the air.
  player.x = W / 2;
  bullets = [];
  shots = [];
  particles = [];
  invaderDir = 1;
  shotTimer = 0;
  invuln = 0;
  stageBanner = BANNER_TIME;
}

// ---------------------------------------------------------------------
// newGame(): reset the score/lives/stage and lay out a fresh board.
// startState is "start" (wait on the start screen) or "playing" (go now).
// ---------------------------------------------------------------------
function newGame(startState) {
  player = { x: W / 2, y: H - CELL - 20 };
  score = 0;
  lives = STARTING_LIVES;
  stage = 1;
  state = startState;
  gameOverHandled = false;
  enteringName = false;
  lastEntry = null;
  hideNameEntry();
  buildLevel();
}

// setup(): the very first screen. Build the board but WAIT — the game
// doesn't move until the player taps/clicks/presses to begin.
function setup() {
  newGame("start");
}

// begin(): leave the start screen and actually start playing.
function begin() {
  if (state !== "start") return;
  state = "playing";
  stageBanner = BANNER_TIME; // flash "STAGE 1" as we kick off
}

// startOrRestart(): what a tap / click / Enter does when you're NOT mid-game
// — begin from the start screen, or play again after game over.
function startOrRestart() {
  if (state === "start") begin();
  else if (state === "lost") newGame("playing");
}

// ---------------------------------------------------------------------
// nextStage(): you cleared the herd! Keep your score and lives, bump the
// stage (which speeds everything up), and lay out a fresh, faster wave.
// ---------------------------------------------------------------------
function nextStage() {
  score += STAGE_BONUS * stage; // reward for clearing the wave
  stage++;
  buildLevel();
}

// ---------------------------------------------------------------------
// KEYBOARD — note when keys go down and up.
// ---------------------------------------------------------------------
document.addEventListener("keydown", (e) => {
  // While the high-score name box is open, let the typing go to it and
  // ignore all game controls (so Space doesn't restart mid-name, etc.).
  if (enteringName) return;
  keys[e.key] = true;
  // M mutes / un-mutes the sound at any time.
  if (e.key === "m" || e.key === "M") { toggleSound(); return; }
  // On the start screen or game-over screen, Enter/Space begins (or restarts).
  if (state !== "playing" && (e.key === "Enter" || e.key === " " || e.key === "Spacebar")) {
    startOrRestart();
    e.preventDefault();
    return;
  }
  // Shoot on a fresh press of Space — one shot per press. We ignore
  // e.repeat (the machine-gun events the OS sends while a key is HELD),
  // so holding Space does nothing; you must tap it for each shot.
  if ((e.key === " " || e.key === "Spacebar") && !e.repeat && state === "playing") {
    bullets.push({ x: player.x, y: player.y - CELL / 2 });
    playShootSound();
  }
  // Stop space/arrows from scrolling the page.
  if ([" ", "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(e.key)) {
    e.preventDefault();
  }
});
document.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

// ---------------------------------------------------------------------
// TOUCH CONTROLS — wire the on-screen buttons (phones/tablets) to the
// same controls the keyboard uses. We use "pointer" events so they work
// for a finger or a mouse. Holding ◀ / ▶ moves; each tap of FIRE shoots.
// ---------------------------------------------------------------------
// A short "pew" laser sound made on the fly with the Web Audio API — no
// sound files needed. A quick downward-sweeping square-wave blip that
// fades out fast. The audio "context" is created on the first shot (browsers
// only allow sound to start after the player interacts with the page).
let audioCtx = null;

// Sound starts ON. Tap the 🔊 button (top-left) or press M to mute; the
// choice is remembered for next time. Every sound checks this first.
let soundOn = true;
try { soundOn = localStorage.getItem("ai-sound") !== "off"; } catch (e) {}
function toggleSound() {
  soundOn = !soundOn;
  try { localStorage.setItem("ai-sound", soundOn ? "on" : "off"); } catch (e) {}
  if (soundOn) playShootSound(); // a tiny chirp so you know sound is back on
}

function playShootSound() {
  if (!soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(880, t);          // start high...
    osc.frequency.exponentialRampToValueAtTime(220, t + 0.12); // ...sweep down
    gain.gain.setValueAtTime(0.15, t);              // gentle volume
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);   // quick fade
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.12);
  } catch (e) { /* if audio isn't available, just stay silent */ }
}

// A short "boom" made with the Web Audio API — a burst of filtered white
// noise that fades out, for when you blow up an animal. No sound files needed.
function playExplosionSound(big = false) {
  if (!soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    // A "big" boom (player hit) is longer and louder than a regular one, but
    // both are deep, sub-bass rumbles. The sound is two layers stacked:
    //   1) a low SINE sweep — the deep "body" you feel in your chest
    //   2) heavily low-passed NOISE — the gritty "rumble" texture on top
    const dur = big ? 1.8 : 1.4;

    // Master gain for the whole boom, with a fast attack and a long fade so it
    // rumbles out rather than popping off abruptly.
    const master = audioCtx.createGain();
    master.gain.setValueAtTime(0.0001, t);
    master.gain.exponentialRampToValueAtTime(big ? 1.0 : 0.9, t + 0.03); // quick swell in
    master.gain.exponentialRampToValueAtTime(0.0001, t + dur);           // long rumble out
    master.connect(audioCtx.destination);

    // A slow LFO wobbles the volume up and down — that pulsing tremor is what
    // makes the boom read as a "rumble" instead of a smooth steady tone.
    const lfo = audioCtx.createOscillator();
    lfo.type = "sine";
    lfo.frequency.setValueAtTime(big ? 14 : 18, t);   // a few wobbles per second
    const lfoDepth = audioCtx.createGain();
    lfoDepth.gain.setValueAtTime(0.5, t);             // how deep the wobble cuts
    lfo.connect(lfoDepth).connect(master.gain);
    lfo.start(t);
    lfo.stop(t + dur);

    // --- Layer 1: deep sine sub-bass sweep (the "boom") ---
    const sub = audioCtx.createOscillator();
    sub.type = "sine";
    sub.frequency.setValueAtTime(big ? 70 : 85, t);  // already very low...
    sub.frequency.exponentialRampToValueAtTime(big ? 16 : 20, t + dur); // ...sinks into deep sub rumble
    const subGain = audioCtx.createGain();
    subGain.gain.setValueAtTime(1.0, t);
    sub.connect(subGain).connect(master);
    sub.start(t);
    sub.stop(t + dur);

    // --- Layer 2: low-passed noise (the gritty "rumble") ---
    const buffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    // Keep the cutoff very low so almost no hiss survives — just low rumble.
    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(big ? 200 : 170, t);
    filter.frequency.exponentialRampToValueAtTime(big ? 35 : 40, t + dur);
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.7, t);
    noise.connect(filter).connect(noiseGain).connect(master);
    noise.start(t);
    noise.stop(t + dur);
  } catch (e) { /* if audio isn't available, just stay silent */ }
}

function fireShot() {
  // Only the FIRE button shoots, and only while playing. Starting the game
  // and restarting are handled by the "tap anywhere" listener below.
  if (state === "playing") {
    bullets.push({ x: player.x, y: player.y - CELL / 2 });
    playShootSound();
  }
}

// A move button holds a direction down while you're pressing it.
function holdButton(id, key) {
  const el = document.getElementById(id);
  const press   = (e) => { e.preventDefault(); keys[key] = true; };
  const release = (e) => { e.preventDefault(); keys[key] = false; };
  el.addEventListener("pointerdown", press);
  el.addEventListener("pointerup", release);
  el.addEventListener("pointercancel", release);
  el.addEventListener("pointerleave", release);
}
holdButton("btn-left", "ArrowLeft");
holdButton("btn-right", "ArrowRight");
document.getElementById("btn-fire").addEventListener("pointerdown", (e) => {
  e.preventDefault();
  fireShot();
});

// The 🔊 toggle's spot on the canvas (in game pixels), and a helper to turn
// a screen tap into game pixels (the canvas is scaled to fit the screen).
const SOUND_ICON = { x: 12, y: 42, w: 36, h: 32 };
function canvasPoint(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}
// Tapping the 🔊 icon toggles sound — and must NOT also start the game,
// so we stop the tap from reaching the "tap anywhere to start" listener.
canvas.addEventListener("pointerdown", (e) => {
  const p = canvasPoint(e);
  if (p.x >= SOUND_ICON.x && p.x <= SOUND_ICON.x + SOUND_ICON.w &&
      p.y >= SOUND_ICON.y && p.y <= SOUND_ICON.y + SOUND_ICON.h) {
    e.stopPropagation();
    toggleSound();
  }
});

// Tap or click ANYWHERE to start from the start screen (or to play again
// after game over). Ignored while you're playing.
document.addEventListener("pointerdown", () => {
  if (enteringName) return; // don't restart while typing your name
  if (state !== "playing") startOrRestart();
});


// ---------------------------------------------------------------------
// update(): the "thinking" half of the game loop. Runs ~60 times a
// second. It moves everything and checks for collisions.
// ---------------------------------------------------------------------
function update() {
  if (state !== "playing") return; // frozen on the game-over screen

  // Each stage speeds the animals up a little. speedScale is 1 on stage 1,
  // 1.12 on stage 2, and so on. shotSpeed is how fast their shots fall now.
  const speedScale = 1 + (stage - 1) * STAGE_SPEEDUP;
  const shotSpeed = SHOT_SPEED * speedScale;
  if (stageBanner > 0) stageBanner--; // count down the "STAGE N" banner

  // --- Move the player ---
  if (keys["ArrowLeft"] || keys["a"] || keys["A"])  player.x -= PLAYER_SPEED;
  if (keys["ArrowRight"] || keys["d"] || keys["D"]) player.x += PLAYER_SPEED;
  // Keep the player inside the screen.
  player.x = Math.max(CELL / 2, Math.min(W - CELL / 2, player.x));

  // (Shooting happens on a key PRESS — see the keydown handler above.)

  // --- Move YOUR bullets up; drop ones that fly off the top ---
  for (const b of bullets) b.y -= PLAYER_BULLET_SPEED;
  bullets = bullets.filter((b) => b.y > -20);

  // --- Move the herd ---
  // The fewer animals are left, the faster they go (classic tension!).
  const aliveCount = invaders.filter((inv) => inv.alive).length;
  const totalCount = ROWS * COLS;
  // Speed grows from 1x up to about 4x as the herd is wiped out.
  const speedMult = 1 + (1 - aliveCount / totalCount) * 3;
  const step = INVADER_SPEED * speedMult * speedScale;

  // Move them sideways. If any hits an edge, the whole herd drops and
  // reverses direction.
  let hitEdge = false;
  for (const inv of invaders) {
    if (!inv.alive) continue;
    inv.x += step * invaderDir;
    if (inv.x > W - CELL / 2 || inv.x < CELL / 2) hitEdge = true;
  }
  if (hitEdge) {
    invaderDir *= -1;
    for (const inv of invaders) {
      if (inv.alive) inv.y += 20; // drop down a row
      // If the animals reach the bottom, it's game over.
      if (inv.alive && inv.y > player.y - CELL) state = "lost";
    }
  }

  // --- Animals shoot ---
  // This works like the REAL Space Invaders: only a few shots fall at
  // once (MAX_SHOTS), and they come on a timer instead of all at the same
  // time. Only the FRONT animal in a column (the lowest one) can shoot,
  // and each animal throws its OWN thing (milk, eggs, mud, bananas, ice).
  if (shotTimer > 0) shotTimer--;
  if (shotTimer === 0 && shots.length < MAX_SHOTS) {
    const shooter = pickShooter();
    if (shooter) {
      const startY = shooter.y + CELL / 2;
      let vx;
      if (Math.random() < AIM_CHANCE) {
        // AIMED shot: work out the sideways drift needed to land where the
        // player is right now (how far across ÷ how long it takes to fall),
        // then cap it so the shot can't fly almost sideways.
        const fallTime = Math.max(1, (player.y - startY) / shotSpeed);
        vx = (player.x - shooter.x) / fallTime;
        vx = Math.max(-AIM_MAX, Math.min(AIM_MAX, vx));
      } else {
        // Stray shot: straight down, or a slight random angle.
        vx = Math.random() < 0.5 ? 0 : (Math.random() * 2 - 1) * SHOT_ANGLE;
      }
      shots.push({ x: shooter.x, y: startY, emoji: shooter.shot, vx: vx });
      // Reload a bit faster as the herd thins out — and faster each stage.
      shotTimer = Math.round(SHOT_RELOAD / speedScale * (0.4 + 0.6 * aliveCount / totalCount));
    }
  }
  // Move shots down (and sideways for angled ones); drop ones that leave the screen.
  for (const m of shots) {
    m.y += shotSpeed;
    m.x += m.vx;
  }
  shots = shots.filter((m) => m.y < H + 20 && m.x > -20 && m.x < W + 20);

  // --- COLLISIONS happen here ---

  // Your bullets hitting animals.
  for (const b of bullets) {
    for (const inv of invaders) {
      if (inv.alive && hit(b.x, b.y, inv.x, inv.y, CELL)) {
        inv.alive = false;          // animal destroyed
        spawnExplosion(inv.x, inv.y); // BOOM!
        playExplosionSound();         // ...and the BOOM is heard
        b.y = -999;                 // send bullet off-screen so it's cleaned up
        score += 10;                // points!
      }
    }
    // Your bullets also chip away at the bases (don't shoot your own cover!).
    if (b.y > -20 && hitBase(b.x, b.y)) b.y = -999;
  }
  bullets = bullets.filter((b) => b.y > -20);

  // Animal shots crumbling the bases (your cover slowly wears down).
  for (const m of shots) {
    if (hitBase(m.x, m.y)) m.y = H + 999;
  }

  // Count down the "safe" flashing time after being hit.
  if (invuln > 0) invuln--;

  // Shots hitting the player. While you're flashing (invuln) you're safe,
  // so one splash can't drain several lives at once.
  for (const m of shots) {
    if (invuln === 0 && hit(m.x, m.y, player.x, player.y, CELL)) {
      m.y = H + 999;       // remove this shot
      lives--;             // lose a life
      invuln = SAFE_TIME;  // brief flashing safety so you can recover
      spawnExplosion(player.x, player.y, 2.5); // a BIG blast where you got hit
      playExplosionSound(true);                // ...and a big boom to match
      if (lives <= 0) state = "lost";
    }
  }
  shots = shots.filter((m) => m.y < H + 20);

  // --- Move the explosion bits and let them fade out ---
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life++;
  }
  particles = particles.filter((p) => p.life < p.maxLife);

  // --- Lose a base, lose the game ---
  // If ANY base is completely wiped out, it's game over — protect them all!
  if (bases.some((base) => base.blocks.every((blk) => !blk.alive))) state = "lost";

  // --- Cleared the herd? On to the next (faster) stage! ---
  // Only if you're still alive, of course.
  if (state === "playing" && invaders.every((inv) => !inv.alive)) nextStage();
}

// ---------------------------------------------------------------------
// hit(): simple box overlap check. Are two things close enough to
// count as touching? (This is "bounding-box" collision.)
// ---------------------------------------------------------------------
function hit(ax, ay, bx, by, size) {
  return Math.abs(ax - bx) < size / 2 && Math.abs(ay - by) < size / 2;
}

// ---------------------------------------------------------------------
// pickShooter(): choose which animal fires next. Like the arcade game,
// only the FRONT (lowest) animal in a column can shoot — so as you clear
// columns, fewer animals can fire at you. Picks a random column each time.
// ---------------------------------------------------------------------
function pickShooter() {
  const alive = invaders.filter((inv) => inv.alive);
  if (alive.length === 0) return null;
  // Pick a random living animal, then find the lowest one in its column.
  const pick = alive[Math.floor(Math.random() * alive.length)];
  let front = pick;
  for (const inv of alive) {
    if (Math.abs(inv.x - pick.x) < 1 && inv.y > front.y) front = inv;
  }
  return front;
}

// ---------------------------------------------------------------------
// isCarved(): which block spots are CUT OUT to give a base its shape —
// rounded top corners and an arched doorway in the bottom middle.
// ---------------------------------------------------------------------
function isCarved(r, c) {
  const lastRow = BASE_BLOCKS_H - 1;
  const lastCol = BASE_BLOCKS_W - 1;
  const mid = Math.floor(BASE_BLOCKS_W / 2);
  // Round off the two top corners.
  if (r === 0 && (c === 0 || c === lastCol)) return true;
  // Carve an arched doorway up from the bottom middle.
  if (r === lastRow && Math.abs(c - mid) <= 1) return true; // 3 blocks wide at the very bottom
  if (r === lastRow - 1 && c === mid) return true;          // 1 block higher in the centre
  return false;
}

// ---------------------------------------------------------------------
// hitBase(): did a shot/bullet at (x, y) hit a base block? If so, that
// block crumbles away and we return true (so the shot is used up).
// ---------------------------------------------------------------------
function hitBase(x, y) {
  for (const base of bases) {
    for (const blk of base.blocks) {
      if (blk.alive && hit(x, y, blk.x, blk.y, BASE_BLOCK)) {
        blk.alive = false; // chip away this block
        return true;
      }
    }
  }
  return false;
}

// ---------------------------------------------------------------------
// EXPLOSIONS — when an animal is shot, throw out a little burst of
// coloured bits that fly apart and fade away.
// ---------------------------------------------------------------------
const BOOM_COLORS = ["#ffffff", "#ffd34d", "#ff8c1a", "#ff4d4d"];
function spawnExplosion(x, y, scale = 1) {
  const count = Math.round(16 * scale);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = (1 + Math.random() * 3.5) * scale;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0,
      maxLife: (18 + Math.random() * 16) * scale,
      color: BOOM_COLORS[Math.floor(Math.random() * BOOM_COLORS.length)],
    });
  }
}


// ---------------------------------------------------------------------
// HIGH SCORES — a "leaderboard" of the best 20 games, kept on THIS
// computer (in the browser's localStorage, the same place the sound
// setting lives). It survives closing the tab, but it's per-device:
// there's no internet server, so it doesn't sync between people.
// Each entry is { name, score, stage }.
// ---------------------------------------------------------------------
const LB_KEY = "ai-scores"; // where the board is saved
const LB_MAX = 20;          // keep only the best 20

// Read the saved board back into an array (sorted best-first). If nothing
// is saved yet, or it's somehow broken, we just start with an empty board.
function loadScores() {
  try {
    const arr = JSON.parse(localStorage.getItem(LB_KEY)) || [];
    return arr.filter((e) => e && typeof e.score === "number");
  } catch (e) { return []; }
}
function saveScores(arr) {
  try { localStorage.setItem(LB_KEY, JSON.stringify(arr)); } catch (e) {}
}

// Does this score earn a place on the board? (Any score > 0 does while
// there are still free spots; after that it must beat the lowest entry.)
function scoreQualifies(s) {
  if (s <= 0) return false;
  const board = loadScores();
  return board.length < LB_MAX || s > board[board.length - 1].score;
}

// Add a finished game to the board, re-sort best-first, and trim to 20.
function recordScore(name, s, st) {
  const board = loadScores();
  board.push({ name: (name || "YOU").slice(0, 12), score: s, stage: st });
  board.sort((a, b) => b.score - a.score);
  board.length = Math.min(board.length, LB_MAX);
  saveScores(board);
}

// --- The "you made the board!" name box (an HTML pop-up, see the CSS) ---
const nameEntryEl = document.getElementById("nameentry");
const nameInputEl = document.getElementById("name");
const saveBtnEl   = document.getElementById("savescore");
const skipBtnEl   = document.getElementById("skipscore");

function showNameEntry() {
  enteringName = true;
  nameEntryEl.style.display = "block";
  // Pre-fill the name you used last time, so regulars can just hit SAVE.
  try { nameInputEl.value = localStorage.getItem("ai-name") || ""; } catch (e) {}
  nameInputEl.focus();
  nameInputEl.select();
}
function hideNameEntry() {
  if (nameEntryEl) nameEntryEl.style.display = "none";
}
function submitName() {
  if (!enteringName) return;
  const name = (nameInputEl.value || "YOU").trim().toUpperCase() || "YOU";
  try { localStorage.setItem("ai-name", name); } catch (e) {}
  recordScore(name, score, stage);
  lastEntry = { name: name, score: score, stage: stage };
  enteringName = false;
  hideNameEntry();
}
// Close the box WITHOUT saving — for when you'd rather not be on the board.
function dismissNameEntry() {
  if (!enteringName) return;
  enteringName = false;
  hideNameEntry();
}
// SAVE button, or Enter while typing, both lock in your name.
saveBtnEl.addEventListener("click", submitName);
// "No thanks" button skips saving and closes the box.
skipBtnEl.addEventListener("click", dismissNameEntry);
nameInputEl.addEventListener("keydown", (e) => {
  // Don't let these keys leak out to the game (e.g. Space restarting).
  e.stopPropagation();
  if (e.key === "Enter") submitName();
  if (e.key === "Escape") dismissNameEntry(); // Esc = "no thanks"
});

// Called once, the moment a game ends: if the score is good enough, open
// the name box; the board itself is drawn on the game-over screen.
function onGameOver() {
  if (scoreQualifies(score)) showNameEntry();
}

// ---------------------------------------------------------------------
// drawLeaderboard(): paint the top-20 list centred at x, starting at
// topY. Laid out in two columns of ten. If `highlight` matches an entry
// (the run you just finished), that line is drawn in gold.
// ---------------------------------------------------------------------
function drawLeaderboard(x, topY, highlight) {
  const board = loadScores();
  ctx.textAlign = "center";
  ctx.fillStyle = "#7ef9ff";
  ctx.font = "24px 'Courier New', monospace";
  ctx.fillText("HIGH SCORES", x, topY);

  if (board.length === 0) {
    ctx.fillStyle = "#888";
    ctx.font = "18px 'Courier New', monospace";
    ctx.fillText("No scores yet — be the first!", x, topY + 34);
    return;
  }

  ctx.font = "18px 'Courier New', monospace";
  const lineH = 24;
  const colW = 250;            // width of one column
  const colX = [x - colW / 2, x + colW / 2]; // left & right column centres
  let highlighted = false;     // only gold-light the FIRST match
  for (let i = 0; i < board.length; i++) {
    const e = board[i];
    const col = i < 10 ? 0 : 1;       // first ten left, next ten right
    const rowY = topY + 34 + (i % 10) * lineH;
    const isMe = !highlighted && highlight &&
                 e.name === highlight.name && e.score === highlight.score &&
                 e.stage === highlight.stage;
    if (isMe) highlighted = true;
    ctx.fillStyle = isMe ? "#ffd34d" : "#fff";
    const rank = String(i + 1).padStart(2, " ");
    const nm = e.name.padEnd(12, " ").slice(0, 12);
    const sc = String(e.score).padStart(5, " ");
    ctx.fillText(rank + ". " + nm + " " + sc, colX[col], rowY);
  }
}

// ---------------------------------------------------------------------
// draw(): the "showing" half of the game loop. Paints everything.
// ---------------------------------------------------------------------
function draw() {
  // Wipe the screen clear each frame. We clear to TRANSPARENT (not black)
  // so the moving starfield behind the game shows through.
  ctx.clearRect(0, 0, W, H);

  // The HUD: score (left), stage (centre), lives (right) at the top.
  ctx.fillStyle = "#fff";
  ctx.font = "20px 'Courier New', monospace";
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  ctx.fillText("SCORE: " + score, 12, 28);
  ctx.textAlign = "center";
  ctx.fillText("STAGE " + stage, W / 2, 28);
  ctx.textAlign = "right";
  ctx.fillText("LIVES: " + "❤️".repeat(lives), W - 12, 28);

  // Small sound toggle, tucked under the score at the top-left. Tap it
  // (or press M) to mute/un-mute. Dimmed when sound is off.
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.font = "26px serif";
  ctx.globalAlpha = soundOn ? 1 : 0.45;
  ctx.fillText(soundOn ? "🔊" : "🔇", SOUND_ICON.x, SOUND_ICON.y + SOUND_ICON.h / 2);
  ctx.globalAlpha = 1;

  // Draw the animals — but NOT on the start screen, where the herd would
  // show through behind the title and high scores and look cluttered. The
  // start screen has its own tidy row of animals instead.
  if (state !== "start") {
    for (const inv of invaders) {
      if (inv.alive) drawThing(inv.animal, inv.x, inv.y);
    }
  }

  // Draw the bases (only the blocks that are still alive).
  ctx.fillStyle = BASE_COLOR;
  for (const base of bases) {
    for (const blk of base.blocks) {
      if (blk.alive) {
        ctx.fillRect(blk.x - BASE_BLOCK / 2, blk.y - BASE_BLOCK / 2, BASE_BLOCK, BASE_BLOCK);
      }
    }
  }

  // Draw your bullets as glowing vertical streaks (like little lasers).
  ctx.strokeStyle = BULLET_COLOR;
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.shadowColor = BULLET_COLOR;
  ctx.shadowBlur = 8;
  for (const b of bullets) {
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x, b.y + BULLET_LENGTH); // streak trails BELOW as it flies up
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // Draw the falling shots — each one is its animal's own thing.
  for (const m of shots) drawThing(m.emoji, m.x, m.y, 28);

  // Draw the player. While safe after a hit, blink it on and off so you
  // can see you're temporarily protected.
  const blinking = invuln > 0 && Math.floor(invuln / 6) % 2 === 0;
  // Rotate the ship -45° so the rocket points straight up, not up-right.
  if (!blinking) drawThing(PLAYER, player.x, player.y, CELL, -Math.PI / 4);

  // Draw the explosion bits, fading and shrinking as they age.
  for (const p of particles) {
    const fade = 1 - p.life / p.maxLife; // 1 → 0 over the particle's life
    ctx.globalAlpha = fade;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1 + 3 * fade, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // "STAGE N" banner at the start of each wave (fades out, game keeps going).
  if (state === "playing" && stageBanner > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, stageBanner / 30); // fade out near the end
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.font = "44px 'Courier New', monospace";
    ctx.fillText("STAGE " + stage, W / 2, H / 2);
    ctx.restore();
  }

  // Start screen — shown until the player taps/clicks/presses to begin.
  if (state === "start") {
    ctx.fillStyle = "rgba(0,0,0,0.65)";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.font = "52px 'Courier New', monospace";
    ctx.fillText("ANIMAL INVADERS", W / 2, 150);
    ctx.font = "40px serif";
    ctx.fillText("🐮 🐔 🐷 🐵 🐧", W / 2, 215);
    ctx.fillStyle = "#7ef9ff";
    ctx.font = "30px 'Courier New', monospace";
    ctx.fillText("▶  TAP or CLICK to START", W / 2, 290);
    ctx.fillStyle = "#888";
    ctx.font = "18px 'Courier New', monospace";
    ctx.fillText("Move with ← →   •   Shoot with Space", W / 2, 330);
    // The best games so far, right on the start screen.
    drawLeaderboard(W / 2, 410);
  }

  // Game-over screen.
  if (state === "lost") {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.font = "48px 'Courier New', monospace";
    ctx.fillText("GAME OVER", W / 2, 150);
    ctx.font = "22px 'Courier New', monospace";
    ctx.fillText("Reached stage " + stage, W / 2, 190);
    ctx.fillText("Score: " + score, W / 2, 222);
    // While the name box is up, that HTML pop-up covers the middle — don't
    // draw the board or the restart hint behind it. Once you've saved (or if
    // you didn't make the board), show the leaderboard and how to play again.
    if (!enteringName) {
      drawLeaderboard(W / 2, 290, lastEntry);
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "22px 'Courier New', monospace";
      ctx.fillText("Tap or press Enter to play again", W / 2, 600);
    }
  }
}


// ---------------------------------------------------------------------
// THE GAME LOOP.
// requestAnimationFrame asks the browser to call loop() again before
// the next screen refresh (about 60 times a second). Each time we
// update everything, then draw it. That's the whole game!
// ---------------------------------------------------------------------
function loop() {
  update();
  // The frame the game ends: deal with it once (save a high score, etc.).
  if (state === "lost" && !gameOverHandled) {
    gameOverHandled = true;
    onGameOver();
  }
  draw();
  requestAnimationFrame(loop);
}

// Build the first game and start the loop.
setup();
loop();


// =====================================================================
// =====  THE STARFIELD  — the space we fly through.  ==================
// =====================================================================
// This runs on its OWN canvas behind the game. Stars drift slowly
// downward (so it feels like we're flying upward through space), come in
// different sizes and colours, and some gently twinkle on and off.

const STAR_COUNT  = 220;   // how many stars are on screen
const STAR_COLORS = [      // mostly white, with a few coloured ones mixed in
  "#ffffff", "#ffffff", "#ffffff",
  "#bcd2ff", // pale blue
  "#fff4c2", // warm yellow
  "#ffd0e0", // pink
  "#c2fff0", // cyan
  "#ffc9a3", // orange
];

const starCanvas = document.getElementById("stars");
const starCtx = starCanvas.getContext("2d");
let stars = [];

// Match the star canvas to the window size (and redo it if the window
// is resized, so the stars always fill the whole screen).
function resizeStars() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeStars);
resizeStars();

// Make one star. Bigger stars drift a little faster, which makes the
// field feel deep — like nearer stars zipping past farther ones.
function makeStar(anywhere) {
  const size = 0.7 + Math.random() * 2.3; // 0.7 — 3.0 pixels across
  return {
    x: Math.random() * starCanvas.width,
    y: anywhere ? Math.random() * starCanvas.height : -2,
    size: size,
    color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)],
    speed: 0.12 + size * 0.18,            // slow drift, faster when bigger
    twinkle: Math.random() < 0.4,         // about 4 in 10 stars blink
    phase: Math.random() * Math.PI * 2,   // where in its blink it starts
    twinkleSpeed: 0.02 + Math.random() * 0.05,
  };
}
for (let i = 0; i < STAR_COUNT; i++) stars.push(makeStar(true));

// Draw + move the stars, ~60 times a second, forever.
function drawStars() {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  for (const s of stars) {
    // Drift downward; when a star falls off the bottom, send it back to
    // the top at a new spot so the field never runs out.
    s.y += s.speed;
    if (s.y > starCanvas.height + 2) {
      s.y = -2;
      s.x = Math.random() * starCanvas.width;
    }
    // Twinkling stars fade in and out; the rest stay steady.
    let alpha = 1;
    if (s.twinkle) {
      s.phase += s.twinkleSpeed;
      alpha = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(s.phase));
    }
    starCtx.globalAlpha = alpha;
    starCtx.fillStyle = s.color;
    // A soft glow in the star's own colour makes it twinkle nicely.
    starCtx.shadowColor = s.color;
    starCtx.shadowBlur = s.size * 3;
    starCtx.beginPath();
    starCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    starCtx.fill();
  }
  starCtx.globalAlpha = 1;
  starCtx.shadowBlur = 0;
  requestAnimationFrame(drawStars);
}
drawStars();
</script>
</body>
</html>
